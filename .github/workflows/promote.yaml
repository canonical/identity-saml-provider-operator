name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      origin-channel:
        description: 'Origin Channel'
        type: string
        required: true
      destination-channel:
        description: 'Destination Channel'
        type: string
        required: true
      charmcraft-channel:
        description: 'Snap channel to use when installing charmcraft'
        required: false
        type: string
        default: 'latest/edge'

jobs:
  promote-charm:
      name: Promote Charm
      uses: canonical/identity-team/.github/workflows/charm-promotion.yaml@15ddf22d348a6ca76a7d82dc702c71ab083f9a80 # v1.13.0
      with:
        origin-channel: ${{ github.event.inputs['origin-channel'] }}
        destination-channel: ${{ github.event.inputs['destination-channel'] }}
        charmcraft-channel: ${{ github.event.inputs['charmcraft-channel'] }}
      secrets:
        CHARMCRAFT_CREDENTIALS: ${{ secrets.CHARMCRAFT_CREDENTIALS }}

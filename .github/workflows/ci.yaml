name: CI
run-name: CI for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-**"
      - "track/**"
    paths-ignore:
      - "terraform/**"
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - "terraform/**"

jobs:
  linting:
    name: Linting
    uses: canonical/identity-team/.github/workflows/_charm-linting.yaml@5830f3e6723de07cb5b7ccb6c84031d8b2964c62 # v1.11.4

  unit-test:
    name: Unit Tests
    uses: canonical/identity-team/.github/workflows/_charm-tests-unit.yaml@5830f3e6723de07cb5b7ccb6c84031d8b2964c62 # v1.11.4
    needs:
      - linting

  integration-test:
    name: Integration Tests
    uses: canonical/identity-team/.github/workflows/_charm-tests-integration.yaml@main
    with:
      container-name: "identity-saml-provider"
      use-charmcraftcache: true
      node-size: large
      pytest-model-option: '--juju-model'
      juju-model-name: 'testing'
    needs:
      - linting
      - unit-test

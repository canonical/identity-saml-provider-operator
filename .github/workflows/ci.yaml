name: CI
run-name: CI for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-**"
      - "track/**"
    paths-ignore:
      - "terraform/**"
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - "terraform/**"

jobs:
  linting:
    name: Linting
    uses: canonical/identity-team/.github/workflows/_charm-linting.yaml@5830f3e6723de07cb5b7ccb6c84031d8b2964c62 # v1.11.4

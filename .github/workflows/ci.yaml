name: CI
run-name: CI for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-**"
      - "track/**"
    paths-ignore:
      - "terraform/**"
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - "terraform/**"

jobs:
  tests:
    name: CI
    uses: canonical/identity-team/.github/workflows/charm-pull-request.yaml@b5070d98993fa72f429f4fdf8010f6f9a94eb4e0 # v1.14.2
    with:
      container-name: "identity-saml-provider"
      use-charmcraftcache: false
      node-size: large
      pytest-model-option: '--juju-model'
      juju-model-name: 'testing'

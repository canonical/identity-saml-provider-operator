name: Publish Charm

on:
  push:
    tags:
      - "v**"
      - "track**"

  workflow_dispatch:
    inputs:
      destination_channel:
        description: CharmHub channel to publish to
        required: false
        default: 'latest/edge'
        type: string
      source_branch:
        description: Github branch from this repo to publish.  If blank, will use the default branch
        required: false
        default: ''
        type: string

permissions:
  contents: read
  issues: write

jobs:
  publish:
    name: Publish Charm
    uses: canonical/identity-team/.github/workflows/charm-publish.yaml@5830f3e6723de07cb5b7ccb6c84031d8b2964c62 # v1.11.4
    with:
      destination_channel: ${{ inputs.destination_channel}}
      source_branch: ${{ inputs.source_branch}}
      use-charmcraftcache: true
    secrets:
      CHARMCRAFT_CREDENTIALS: ${{ secrets.CHARMCRAFT_CREDENTIALS}}

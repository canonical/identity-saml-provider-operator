name: Auto Approve PRs
run-name: CI for approving PRs

on:
  push:
    branches:
      - "renovate/**"
      - "automated-update-charm-libs"

jobs:
  auto-approve:
    name: Auto-approve and merge pull request
    uses: canonical/identity-team/.github/workflows/pr-auto-approval.yaml@d494c16b0ad34b623776893a37c2f70046d0587c # v1.12.1
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

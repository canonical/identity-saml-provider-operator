# This file configures Charmcraft.
# See https://canonical-charmcraft.readthedocs-hosted.com/en/stable/reference/files/charmcraft-yaml-file/# for guidance.

name: identity-saml-provider-operator
type: charm
title: Identity SAML Provider
summary: |
  A complete SAML-to-OIDC bridge solution that enables SAML-based Single Sign-On (SSO) through Ory Hydra,
  allowing seamless integration between SAML Service Providers and OIDC providers.
description: |
  This project provides a SAML Identity Provider that bridges between traditional SAML Service Providers
  and modern OIDC-based authentication systems.

assumes:
  - juju >= 3.6
  - k8s-api

peers:
  peer:

    interface: identity-saml-provider-peer

containers:
  identity-saml-provider:
    resource: oci-image

resources:
  oci-image:
    type: oci-image
    description: OCI image for Identity SAML Provider
    upstream-source: ghcr.io/canonical/identity-saml-provider:v0.1.2

requires:
  database:
    interface: postgresql_client
    limit: 1
    optional: false
  public-route:
    interface: traefik_route
    limit: 1
    optional: false
  oauth:
    interface: oauth
    limit: 1
    optional: false
  receive-ca-cert:
    interface: certificate_transfer
    limit: 1
    optional: false

config:
  options:
    saml_credentials:
      type: secret
      required: true
      description: |
        The Juju secret ID (prefixed by "secret:") containing the public certificate and private key for SAML assertion.
        The secret content MUST contain "public-cert" and "private-key" fields.
    cpu_limit:
      description: |
        K8s cpu resource limit, e.g. "1" or "500m". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements.
      type: string
    memory_limit:
      description: |
        K8s memory resource limit, e.g. "1Gi". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements.
      type: string

actions:
  run-migration:
    description: Run database migrations.
    params:
      timeout:
        description: Timeout (seconds) for the migration process.
        type: number
        default: 120

parts:
  charm:
    plugin: charm

platforms:
  ubuntu@24.04:amd64:

# This file configures Charmcraft.
# See https://canonical-charmcraft.readthedocs-hosted.com/en/stable/reference/files/charmcraft-yaml-file/# for guidance.

name: identity-saml-provider-operator
type: charm
title: Identity SAML Provider
summary: |
  A complete SAML-to-OIDC bridge solution that enables SAML-based Single Sign-On (SSO) through Ory Hydra, allowing seamless integration between SAML Service Providers and OIDC providers.
description: |
  This project provides a SAML Identity Provider that bridges between traditional SAML Service Providers and modern OIDC-based authentication systems

assumes:
  - juju >= 3.6
  - k8s-api

peers:
  peer:
    interface: identity-saml-provider-peer

containers:
  identity-saml-provider:
    resource: oci-image

resources:
  oci-image:
    type: oci-image
    description: OCI image for Identity SAML Provider
    upstream-source: ghcr.io/canonical/identity-saml-provider:0.1.0

config:
  options:
    log-level:
      description: |
        Configures the log level of gunicorn.

        Acceptable values are: "info", "debug", "warning", "error" and "critical"
      default: "info"
      type: string
    cpu:
      description: |
        K8s cpu resource limit, e.g. "1" or "500m". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements (the "requests" portion is
        automatically deduced from it).
        See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
      type: string
    memory:
      description: |
        K8s memory resource limit, e.g. "1Gi". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements (the "requests" portion is
        automatically deduced from it).
        See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
      type: string

parts:
  charm:
    plugin: charm

platforms:
  ubuntu@22.04:amd64:
